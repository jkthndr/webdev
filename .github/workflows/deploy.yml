name: Deploy to Dell Laptop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and tag image
        run: docker build -t ghcr.io/jkthndr/webdev:latest .

      - name: Push to GHCR
        run: docker push ghcr.io/jkthndr/webdev:latest

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        working-directory: C:\Users\olive\Projects\webdev

    steps:
      - name: Pull latest code
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Pull image and recreate container
        run: |
          docker compose pull
          docker compose up -d --force-recreate

      - name: Wait for healthy
        shell: cmd
        run: |
          ping -n 12 127.0.0.1 >nul
          curl.exe -sf http://localhost:4500/api/health || exit /b 1
          curl.exe -sf http://100.115.18.15:4500/api/health || exit /b 1
          echo Deploy successful
