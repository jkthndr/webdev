name: Deploy to HP Laptop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows]
    steps:
      - name: Pull latest code
        run: |
          cd C:\Users\oliver\Projects\webdev
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd C:\Users\oliver\Projects\webdev
          npm install

      - name: Build
        run: |
          cd C:\Users\oliver\Projects\webdev
          npm run build

      - name: Restart server
        shell: cmd
        run: |
          powershell -Command "Get-NetTCPConnection -LocalPort 4500 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty OwningProcess | ForEach-Object { Stop-Process -Id $_ -Force -ErrorAction SilentlyContinue }"
          ping -n 3 127.0.0.1 >nul
          schtasks /run /tn WebdevMCP
          ping -n 12 127.0.0.1 >nul
          curl.exe -sf http://localhost:4500/api/health || exit /b 1
          echo Deploy successful
