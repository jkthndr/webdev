name: Deploy to HP Laptop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows]
    steps:
      - name: Pull latest code
        run: |
          cd C:\Users\oliver\Projects\webdev
          git -c credential.helper= pull origin main

      - name: Install dependencies
        run: |
          cd C:\Users\oliver\Projects\webdev
          npm install

      - name: Build
        run: |
          cd C:\Users\oliver\Projects\webdev
          npm run build

      - name: Restart server
        shell: cmd
        run: |
          cd C:\Users\oliver\Projects\webdev
          for /f "tokens=5" %%a in ('netstat -aon ^| findstr :4500 ^| findstr LISTENING') do taskkill /f /t /pid %%a 2>nul
          timeout /t 2 /nobreak >nul
          start /b node dist\server\index.js > webdev.log 2>&1
          timeout /t 8 /nobreak >nul
          curl -sf http://localhost:4500/api/health || exit 1
          echo Deploy successful
