name: Deploy to HP Laptop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows]
    steps:
      - name: Pull latest code
        run: |
          cd C:\Users\oliver\Projects\webdev
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd C:\Users\oliver\Projects\webdev
          npm install

      - name: Build
        run: |
          cd C:\Users\oliver\Projects\webdev
          npm run build

      - name: Restart server
        run: |
          cd C:\Users\oliver\Projects\webdev
          # Kill process on port 4500
          $procs = Get-NetTCPConnection -LocalPort 4500 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty OwningProcess
          foreach ($p in $procs) { Stop-Process -Id $p -Force -ErrorAction SilentlyContinue }
          Start-Sleep -Seconds 2
          # Start server detached
          Start-Process -FilePath "node" -ArgumentList "dist\server\index.js" -WorkingDirectory "C:\Users\oliver\Projects\webdev" -WindowStyle Hidden -RedirectStandardOutput "C:\Users\oliver\Projects\webdev\webdev.log" -RedirectStandardError "C:\Users\oliver\Projects\webdev\webdev.err.log"
          Start-Sleep -Seconds 8
          # Health check
          $health = curl.exe -sf http://localhost:4500/api/health
          if (-not $health) { Write-Error "Health check failed"; exit 1 }
          Write-Output "Deploy successful: $health"
