services:
  mcp-server:
    image: ghcr.io/smithbuilder/webdev:latest
    build: .
    container_name: webdev-mcp
    restart: unless-stopped
    ports:
      - "4500:4500"
      - "4501-4510:4501-4510"
    volumes:
      - webdev-projects:/app/projects
    environment:
      - HTTP_PORT=4500
      - NODE_ENV=production
    mem_limit: 2048m
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4500/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  webdev-projects:
